name: sundial
description: Local-first outdoor time tracker — OpenHearth.
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  # clock.now() instead of DateTime.now() in date-windowed UI so tests can
  # pin "today" with withClock (StillLife precedent) — date-relative renders
  # otherwise go stale daily and date-seeded goldens rot.
  clock: ^1.1.1
  riverpod_annotation: ^2.3.5
  drift: ^2.18.0
  drift_flutter: ^0.2.2
  sqlite3_flutter_libs: ^0.5.24
  go_router: ^14.2.7
  fpdart: ^1.1.0
  uuid: ^4.4.2
  # 0.20.2 floor required by sanctuary_backup_ui's sibling path dep.
  intl: ^0.20.2
  shared_preferences: ^2.3.2
  path_provider: ^2.1.4
  path: ^1.9.0
  confetti: ^0.7.0
  pdf: ^3.10.8
  printing: ^5.13.1
  share_plus: ^10.0.3
  lucide_flutter: ^1.7.0
  file_picker: ^8.1.0
  home_widget: ^0.7.0
  # Encrypted backup (.ohbk) — sibling path deps, eloEngine precedent
  # (SANCTUARY-BRIEF §3). Clone both next to this repo; see README.
  sanctuary_auth_core:
    path: ../packages/sanctuary_auth_core
  sanctuary_backup_ui:
    path: ../packages/sanctuary_backup_ui

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon/app_icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#F5F0E8"
  adaptive_icon_foreground: "assets/icon/app_icon.png"

dev_dependencies:
  flutter_launcher_icons: ^0.14.1
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  build_runner: ^2.4.12
  riverpod_generator: ^2.4.3
  drift_dev: ^2.18.0
  mocktail: ^1.0.4
  flutter_lints: ^4.0.0
  flutter_goldens:
    sdk: flutter

flutter:
  uses-material-design: true

  assets:
    - assets/icon/

  fonts:
    - family: Lora
      fonts:
        - asset: assets/fonts/Lora-Regular.ttf
        - asset: assets/fonts/Lora-Italic.ttf
          style: italic
        - asset: assets/fonts/Lora-Medium.ttf
          weight: 500
        - asset: assets/fonts/Lora-Bold.ttf
          weight: 700
    - family: Nunito
      fonts:
        - asset: assets/fonts/Nunito-Regular.ttf
        - asset: assets/fonts/Nunito-Medium.ttf
          weight: 500
        - asset: assets/fonts/Nunito-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Nunito-Bold.ttf
          weight: 700
